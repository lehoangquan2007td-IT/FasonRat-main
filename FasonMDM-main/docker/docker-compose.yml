# Production — pull from Docker Hub
# Usage: docker compose -f docker/docker-compose.yml up -d

services:
  fasonrat:
    image: fahimahamed/fasonrat:latest
    container_name: fasonrat
    ports:
      - "32766:32766"
    volumes:
      - fasonrat-data:/app/backend/data
    environment:
      - NODE_ENV=production
    env_file:
      - path: .env
        required: false
    mem_limit: 2g
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coturn:
    image: coturn/coturn:latest
    container_name: fasonrat-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    command:
      - -n
      - --log-file=stdout
      - --min-port=49152
      - --max-port=65535
      - --use-auth-secret
      - --static-auth-secret=fasonsecret
      - --realm=fason.rat
    restart: unless-stopped

volumes:
  fasonrat-data:
    driver: local
